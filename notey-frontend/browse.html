<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Browse Notes - Notey</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="nav-bar">
            <h1 class="logo">Notey</h1>
            <div class="menu" id="menu"></div>

            <div class="nav-controls">
                <div class="hamburger" id="hamburger">
                    ☰
                </div>

            <button id="darkModeBtn">🌙</button>
            </div>
        </div>

        <div class="browse-header">
            <h1>📚 Browse Notes</h1>
            <p>Find notes shared by students.</p>
        </div>

        <div class="search-bar">
            <input id="searchInput" type="text" placeholder="Search notes by title or subject...">
        </div>

        <div class="notes-container" id="notesContainer">

        </div>

        <footer>
            <p>© 2026 Notey. All Rights Reserved.</p>
        </footer>

        <script src="script.js"></script>

    </body>
</html>
