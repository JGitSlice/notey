<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Profile - Notey</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <div class="nav-bar">
            <h1 class="logo">Notey</h1>
            <div class="menu" id="menu"></div>

            <div class="nav-controls">
                <div class="hamburger" id="hamburger">
                    ☰
                </div>

            <button id="darkModeBtn">🌙</button>
            </div>
        </div>

        <div class="profile-container">

            <div class="profile-card">

                <div class="profile-image-section">

                    <img src="assets/images/default-profile.png"
                        alt="Profile Picture"
                        class="profile-pic"
                        id="profilePic">

                    <label for="profileImageInput" class="upload-photo-btn">
                        Change Photo
                    </label>

                    <input type="file"
                        id="profileImageInput"
                        accept="image/*">

                </div>

                <h1>My Profile</h1>

                <div class="profile-info">
                    <p>
                        <strong>Username:</strong>
                        <span id="profileUsername"></span>
                    </p>

                    <p>
                        <strong>Email:</strong>
                        <span id="profileEmail"></span>
                    </p>

                    <p>
                        <strong>Total Notes:</strong>
                        <span id="profileNotesCount"></span>
                    </p>
                </div>

                <div class="profile-actions">

                    <button onclick="location.href='editprofile.html'">
                        Edit Profile
                    </button>

                    <button onclick="location.href='resetpassword.html'">
                        Reset Password
                    </button>

                </div>

            </div>

        </div>


        <footer>
            <p>© 2026 Notey. All Rights Reserved.</p>
        </footer>

        <script src="script.js"></script>

    </body>
</html>
